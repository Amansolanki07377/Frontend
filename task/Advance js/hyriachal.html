<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // single Inheritance : // multilevel Inheritance :
        class A {
            data1(){
                console.log("data member 1 from class A");
            }
        }

    class b extends A{
        data2(){
            console.log("data member 2 from class B");
        }
    }

    class C extends A{
        data3(){
            console.log("data member 3 from class C");
        }
    }
    const obj = new b();
    const obj2 = new C();
    obj.data1();
    obj.data2();
    obj2.data3();
    obj2.data1();
    </script>
</body>
</html>
